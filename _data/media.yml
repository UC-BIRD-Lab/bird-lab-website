#    image : /assets/img/news/…  → thumbnail for a featured NON-YouTube card.
#
#  OPTIONAL, per entry (like the press archive):
#    doi : "10.xxxx/…"  → adds a blue "📄 Paper" link to the peer-reviewed source
#    tag : "Award"       → adds a reason chip: Center · Award · Funding · Profile · Feature
#  An entry shows at most one chip; `doi` wins if both are set.
#
#  Keep newest first.
