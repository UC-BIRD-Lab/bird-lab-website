# ─────────────────────────────────────────────────────────────
#  DO-NOT-LIST — OpenAlex sometimes returns things under the lab's ORCID that
#  aren't really papers (a profile write-up, a talk abstract indexed like an
#  article, …). List their BARE DOI here and the sync will drop them and never
#  re-add them. Add a short `reason:` for the next person.
# ─────────────────────────────────────────────────────────────
exclude:
  - doi: "10.1242/jeb.245923"    # "ECR Spotlight – Christina Harvey" — profile write-up, not a paper
    reason: "Journal spotlight/profile of the PI, not a research paper."
  - doi: "10.1117/12.2666179"    # "Nature, smart structures, and morphing UAVs" — conference talk
    reason: "Invited conference talk, not a peer-reviewed paper."
