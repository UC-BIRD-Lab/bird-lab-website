# ─────────────────────────────────────────────────────────────
#  PUBLICATIONS, manually maintained
#  Conference talks & posters WITHOUT a DOI, plus blog posts. These are NOT
#  indexed by OpenAlex, so add them here by hand. Conference/meeting papers that
#  DO have a DOI (e.g. AIAA SciTech/AVIATION) are pulled automatically into
#  publications.yml, so don't add those here. See MAINTENANCE.md.
#
#  If a talk you added here later gets a DOI and syncs into publications.yml,
#  delete it here to keep this file tidy. As a safety net, the Publications page
#  already hides any entry here whose title matches a synced one (the DOI version
#  wins), so you won't see a duplicate even if you forget.
# ─────────────────────────────────────────────────────────────

