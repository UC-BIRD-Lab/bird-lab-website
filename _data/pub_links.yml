# ─────────────────────────────────────────────────────────────
#  PUBLICATION EXTRAS, the hand-curated "rich info" for a paper.
#
#  WHY THIS FILE EXISTS: journal articles in `_data/publications.yml` are synced
#  automatically from ORCID (the monthly bot only ADDS new DOIs and never
#  rewrites entries). Things the bot can't know, a data link, a code repo, a
#  figure, live HERE instead, so the automation is never blocked and your
#  extras are never overwritten.
#
#  HOW IT WORKS: each entry is matched to a paper by its DOI. Use the BARE doi
#  (no "https://doi.org/"). All fields are optional:
#     doi:    the paper's DOI, e.g. "10.1098/rsif.2025.0868"   (required to match)
#     data:   link to the dataset (FigShare, Dryad, Zenodo…)
#     code:   link to the code (a GitHub repo)
#     preprint: link to a free preprint/author copy (ResearchGate, arXiv, bioRxiv,
#               an institutional repository…). Shows a "Preprint" pill. Use this for
#               the copy you posted yourself.
#     pdf:    link to a free open-access PDF of the *published* version. Shows an
#               "Open access" pill. You rarely need this by hand: when a paper is
#               open access, the sync bot auto-fills `oa_url` in publications.yml and
#               the same pill appears automatically. Set `pdf:` only to override that
#               auto link (a `pdf:` here always wins over the auto `oa_url`).
#     image:  a SMALL figure, add only for MAJOR papers, or the list gets busy
#     kind:   for a JOURNAL article, its sub-type, "review" or "commentary".
#             Untagged journal articles read "Research article". Changes only the
#             pill's label; the colour stays green.
#     award:  an honor this paper received (e.g. "AIAA Jefferson Goblet Student
#             Paper Award"), shows as a gold 🏆 pill next to the paper.
#     correction: link to a published correction/corrigendum for this paper, it
#                 shows as a "Correction" pill next to the paper. (The sync bot
#                 skips corrections, so add them here.) Optional `correction_label:`
#                 overrides the pill text (e.g. "Corrigendum").
#
#  Nothing shows until the paper itself appears on the Publications page, so you
#  can add an entry here the moment a paper is accepted.
#
#  NOTE ON PRESS: you do NOT list news coverage here. Press lives in
#  `_data/press.yml`; tag a story with the paper's `doi:` there and it is counted
#  automatically as the "In the news · N" badge next to that paper.
#
#  The entries below were populated from the UC-BIRD-Lab & charvey23 GitHub orgs
#  and public FigShare/Dryad datasets. Add `data:`/`code:` to more papers as
#  their repositories go public.
# ─────────────────────────────────────────────────────────────

