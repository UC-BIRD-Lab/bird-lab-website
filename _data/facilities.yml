# ─────────────────────────────────────────────────────────────
#  FACILITIES
# ─────────────────────────────────────────────────────────────

- name: Center for Animal Locomotion and Innovation (CALI)
  partner: Co-directed with Dr. Michelle Hawkins
  location: California Raptor Center, UC Davis
  url: https://sites.google.com/ucdavis.edu/cali/home
  url_label: Visit the CALI consortium
  photo: /assets/img/facilities/cali.jpg
  blurb: >-
    CALI is a purpose-built flight hall for studying real animal flight and
    translating those insights into agile aerial robots. We combine controlled
    indoor flight trials with high-speed motion capture, photogrammetry, and
    rapid prototyping to test bio-informed designs. The facility, established
    with a $2.9M DURIP equipment award and opened in 2026, anchors a broader
    consortium connecting engineering, biology, and veterinary medicine.
  capabilities:
    - Controlled-environment indoor flight hall
    - Four attached mews
    - 48-camera OptiTrack Versa 120 system
    - 9-camera high speed Phantom photogrammetry system

- name: UC Davis Aeronautical Wind Tunnel
  partner: Co-directed with Dr. Camli Badrya
  location: UC Davis Bainer Hall
  photo: /assets/img/facilities/wind-tunnel.jpg
  blurb: >-
    A university wind-tunnel facility for precision aerodynamic testing of
    airfoils, morphing wings, and small UAV platforms. Researchers measure
    forces, pressures, and flow behavior to validate models and refine designs.
  capabilities:
    - Force and pressure measurement
    - Airfoil, morphing-wing & small-UAV testing
    - 48" x 33.6" x 12' test section

- name: Specimen-focused Motion Capture Room
  location: UC Davis Bainer Hall
  photo: /assets/img/facilities/specimen-room.jpg
  blurb: >-
    A dedicated space for high-resolution motion capture and morphological
    measurement of wing specimens across their full range of motion.
  capabilities:
    - Specimen range-of-motion capture
    - Morphological measurement
    - five-camera OptiTrack Flex13 system
