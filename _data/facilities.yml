# ─────────────────────────────────────────────────────────────
#  FACILITIES
#
#  featured: true      → rendered as the full-bleed "flagship" band at the top
#                        (only set this on ONE facility).
#  tagline             → one credible line shown with the name.
#  funding:            → optional credit badge shown in the corner of the
#                        flagship photo ({ note, name, logo, url }).
#  specs:              → big-number tiles (the headline capabilities). Each is
#                        { value, label }. Keep `value` short (a number, size,
#                        speed, or amount); the `label` says what it is.
#  capabilities:       → remaining qualitative features, shown as chips.
#  blurb               → optional; kept minimal. Prefer specs + chips over prose.
#  photo_alt           → alt text describing the photo for screen-reader users.
#                        Say what the image shows (and note if it is a rendering,
#                        not a photo). Falls back to "Inside {name}" if omitted.
# ─────────────────────────────────────────────────────────────

- name: Center for Animal Locomotion and Innovation (CALI)
  featured: true
  tagline: >-
    Purpose-built flight hall for studying animal locomotion
    translating it into robotics and rehabilitation metrics.
  partner: Co-directed with Dr. Michelle Hawkins
  location: California Raptor Center, UC Davis
  url: https://sites.google.com/ucdavis.edu/cali/home
  url_label: Visit the CALI consortium
  photo: /assets/img/facilities/cali.jpg
  photo_alt: >-
    The CALI flight hall: a long, brightly lit room with white curtains
    lining both walls, motion capture cameras mounted along them, and an
    open concrete floor leading to a roll-up door.
  funding:
    note: "DURIP support from:"
    name: DEVCOM Army Research Laboratory
    logo: /assets/img/partners/arl.png
    url: https://www.arl.army.mil/
  specs:
    - { value: "44", label: "OptiTrack Versa 120x motion capture cameras" }
    - { value: "9", label: "high-speed Phantom cameras" }
    - { value: "4", label: "attached bird mews" }
    - { value: "2", label: "high-performance workstations" }
  capabilities:
    - Sub-millisecond, sub-millimeter tracking
    - High-speed 3D reconstruction
    - Controlled-environment flight hall
    - Daylight-balanced lighting for live birds

- name: UC Davis Aeronautical Wind Tunnel
  tagline: >-
    Precision aerodynamic testing of airfoils, morphing wings, and small UAVs.
  partner: Co-directed with Dr. Camli Badrya
  location: UC Davis Bainer Hall
  photo: /assets/img/facilities/wind-tunnel.jpg
  photo_note: AI rendering based on real photos, to illustrate the setup.
  photo_alt: >-
    Rendering of the wind tunnel: a wide blue intake with a mesh screen
    narrowing into a silver test section with a viewing window, then a
    long blue tube ending at the fan.
  specs:
    - { value: "165 mph", label: "maximum test-section speed" }
    - { value: "< 0.1%", label: "free-stream turbulence" }
    - { value: "48 × 33.6 in", label: "closed test section" }
  capabilities:
    - Six-component force & moment balance
    - 2D-2C Particle Image Velocimetry (PIV) system
    - Two axis traverse system
    - Bambu Lab 3D printer


- name: Specimen-focused Motion Capture Room
  tagline: >-
    High-resolution capture of specimens across their full range of motion.
  location: UC Davis Bainer Hall
  photo: /assets/img/facilities/specimen-room.jpg
  photo_note: AI rendering based on real photos, to illustrate the setup.
  photo_alt: >-
    Rendering of the specimen room: five motion capture cameras on
    tripods encircling a small round table with a laptop.
  specs:
    - { value: "5", label: "OptiTrack Flex13 motion capture cameras" }
    - { value: "1", label: "Dedicated specimen freezer" }
  capabilities:
    - Specimen range-of-motion capture
    - Morphological measurement
