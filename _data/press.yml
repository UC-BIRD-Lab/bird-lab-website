# ─────────────────────────────────────────────────────────────
#  IN THE NEWS, external press coverage. Newest year first.
#  Add an item: title, url, source, year.
#  Optional `doi:`, the DOI of the paper the story is about. When set, that
#  paper on the Publications page shows a "In the news · N" badge counting its
#  stories. Use the bare DOI, e.g.  doi: "10.1098/rsif.2025.0868"
#
#  Optional `featured: true` + `image:`, promotes a story to the big cards at
#  the top of the News page. `image:` can be a local file (/assets/img/…) OR a
#  direct URL to the article's own image, e.g.
#    image: "https://example.com/story-hero.jpg"
#
#  Optional `tag:` labels WHY a non-paper story is in this list. Use it for
#  coverage not tied to a single paper (a `doi:` already shows a "Paper" pill,
#  so a tagged row should not also carry a doi). Keep to this small vocabulary:
#    Center   — the flight-research center / CALI facility (openings, groundbreak)
#    Award    — fellowships, faculty honors, rising-star recognition
#    Funding  — grants and research-award milestones (DOD/Army, $1B, etc.)
#    Profile  — interviews or profiles of the PI or lab members
#    Feature  — general research coverage not tied to one specific paper
# ─────────────────────────────────────────────────────────────

