# ─────────────────────────────────────────────────────────────
#  BIRD Lab, Jekyll configuration
#  Bio-Informed Research & Design Lab · UC Davis
# ─────────────────────────────────────────────────────────────

title: "BIRD Lab"
tagline: "Bio-Informed Research & Design"
description: >-
  The BIRD Lab at UC Davis studies how birds fly in order to build better
  aircraft. We identify fundamental biological principles of flight and refine
  them to improve engineered systems through bio-informed research.

# Site address. `url` is the ORIGIN only (no path, no trailing slash).
# Leave `baseurl` EMPTY, the deploy workflow fills in the project path
# ("/bird-lab-website") automatically at build time, and an empty baseurl keeps
# the Site-checks link test passing. When you move to the custom domain, just
# change `url` to "https://birdlab.ucdavis.edu".
url: "https://uc-bird-lab.github.io"
baseurl: ""

lab:
  full_name: "Bio-Informed Research & Design Lab"
  institution: "University of California, Davis"
  pi: "Dr. Christina Harvey"
  pi_email: "harvey@ucdavis.edu"
  orcid: "0000-0002-2830-0844"
  scholar: "https://scholar.google.com/citations?hl=en&user=_uRCRPgAAAAJ"
  location: "Department of Mechanical & Aerospace Engineering, UC Davis, Davis, CA"
  # PI / lab links surfaced in the footer and Data & Code section.
  linkedin: "https://www.linkedin.com/in/Christina-A-Harvey"
  github_org: "https://github.com/UC-BIRD-Lab"
  # FigShare (or other data repository) for published data/code.
  figshare_url: "https://figshare.com/authors/Christina_Harvey/4766004"

# Default social-share (Open Graph) image used by jekyll-seo-tag.
# Points at the BIRD Lab logo on white.
# To use a photo instead, point this at /assets/img/og-image.jpg (the wind-tunnel shot).
image: /assets/img/logo_whiteshading.png

# Optional image assets. 
# Pages only render the image when its path is set, so the build never references a missing file.
assets:
  # Lab group photo. Powers BOTH the People-page group photo
  # and the Home "In the field" cinematic band.
  lab_photo: "/assets/img/lab/CALIopening-photo-edited-2026.jpg"
  # Playful wind-tunnel candid shown as the "lab culture" moment on the Join page.
  culture_photo: "/assets/img/lab/labphoto-silly-2024.jpg"

# Private member workspace (Notion - Internal Pages).
member_portal_url: "https://app.notion.com/p/birdlab/Internal-Lab-Pages-6d6f4c7465a44de5a518a5a6786593f1"

# Undergraduate interest form
undergrad_form_url: "https://forms.gle/TsddkYBtYMH5zkt78"

# Privacy-friendly, cookieless analytics (GoatCounter). 
analytics:
  goatcounter: "birdlab"   


# ── Build settings ───────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
permalink: pretty
sass:
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-last-modified-at   # per-page "Last updated" date, from git history

# ── Lab guide category order ─────────────────────────────────
# Single source of truth for the guide's category order. Both the guide
# landing page and the wiki sidebar read from this. Add a new category
# here when you introduce one (the landing page warns if you forget).
guide_order:
  - Getting Started
  - Communication & Culture
  - Working in the Lab
  - Research Workflow
  - Writing & Dissemination
  - Professional Development

# ── Collections ──────────────────────────────────────────────
collections:
  guide:
    output: true
    permalink: /lab-guide/:name/

defaults:
  - scope: { path: "", type: "guide" }
    values: { layout: "wiki" }
  - scope: { path: "" }
    values: { layout: "page" }

exclude:
  - README.md
  - MAINTENANCE.md
  - ARCHITECTURE.md
  - CONTENT-GUIDE.md
  - CONTRIBUTING.md
  - scripts/
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .github/
  - pa11yci.json
  # FUSE / editor-sync artifacts (".fuse_hiddenXXXX") can appear in collection
  # folders when a file is edited while another process holds it open. They carry
  # stale, sometimes corrupted front matter (a missing category shows up as a
  # blank card on the Lab Guide hub), so keep them out of the build entirely.
  - ".fuse_hidden*"
  - "_guide/.fuse_hidden*"
