---
layout: default
---
<div class="page-head">
  <div class="container prose">
    <p class="breadcrumbs"><a href="{{ '/news/' | relative_url }}">News</a></p>
    <h1>{{ page.title }}</h1>
    {% if page.date %}<p class="muted">{{ page.date | date: "%B %-d, %Y" }}</p>{% endif %}
  </div>
</div>
<div class="section">
  <div class="container prose">
    {{ content }}
    <hr class="divider">
    <p><a href="{{ '/news/' | relative_url }}">&larr; All news &amp; updates</a></p>
  </div>
</div>
